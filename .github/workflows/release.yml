name: Release

# Triggers when a GitHub Release is published.
# Workflow:
#   1. Substitute #{VERSION}#, #{URL}#, #{MANIFEST}#, #{DOWNLOAD}# tokens in module.json
#   2. Zip the module
#   3. Attach module.json + module.zip to the release as assets
#
# After publish, the manifest URL `releases/latest/download/module.json`
# always resolves to the most recent release's manifest.

env:
  # Opt actions into Node 24 ahead of GitHub's deprecation of Node 20 on 2026-09-16.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  project_url:         "https://github.com/${{ github.repository }}"
  latest_manifest_url: "https://github.com/${{ github.repository }}/releases/latest/download/module.json"
  release_module_url:  "https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/module.zip"

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      # Tag must be either "v1.2.3" or "1.2.3"
      - name: Extract Version From Tag
        id: get_version
        uses: battila7/get-version-action@v2

      - name: Modify Module Manifest With Release-Specific Values
        uses: cschleiden/replace-tokens@v1
        with:
          files: 'module.json'
        env:
          VERSION:  ${{ steps.get_version.outputs.version-without-v }}
          URL:      ${{ env.project_url }}
          MANIFEST: ${{ env.latest_manifest_url }}
          DOWNLOAD: ${{ env.release_module_url }}

      - name: Create Module Archive
        # CRITICAL: list EVERY runtime-loaded directory below. Anything
        # missing here 404s in user installs and aborts the entry script.
        # `systems/` is required because `scripts/systems.js` imports
        # `../systems/<system-id>.js` shims (currently dnd5e.js).
        run: |
          zip --recurse-paths ./module.zip \
            module.json \
            README.md \
            LICENSE \
            scripts/ \
            styles/ \
            templates/ \
            lang/ \
            systems/

      - name: Update Release With Files
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          name:         ${{ github.event.release.name }}
          draft:        ${{ github.event.release.unpublished }}
          prerelease:   ${{ github.event.release.prerelease }}
          token:        ${{ secrets.GITHUB_TOKEN }}
          artifacts:    './module.json, ./module.zip'
          tag:          ${{ github.event.release.tag_name }}
          body:         ${{ github.event.release.body }}
